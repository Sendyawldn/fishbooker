name: Release Readiness

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Target environment label for release prep"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

jobs:
  release-summary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release summary
        run: |
          printf "FishBooker release readiness for %s\n" "${{ inputs.target_environment }}" > release-summary.txt
          printf "Generated at: $(date -u +"%Y-%m-%dT%H:%M:%SZ")\n" >> release-summary.txt
          printf "\nRequired artifacts:\n" >> release-summary.txt
          printf "- docs/openapi.yaml\n- docs/deployment.md\n- backend/.env.example\n- frontend/.env.example\n" >> release-summary.txt

      - name: Upload release summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: fishbooker-release-summary-${{ inputs.target_environment }}
          path: release-summary.txt
