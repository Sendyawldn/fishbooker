name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Typecheck frontend
        run: npx tsc --noEmit

      - name: Run frontend unit tests
        run: npm test

      - name: Build frontend
        run: npm run build

  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: ${{ runner.os }}-php-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install backend dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare backend environment
        run: |
          cp .env.example .env
          touch database/testing.sqlite
          php artisan key:generate

      - name: Run backend tests
        env:
          APP_ENV: testing
          APP_DEBUG: true
          DB_CONNECTION: sqlite
          DB_DATABASE: database/testing.sqlite
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          LOG_CHANNEL: stderr
          MANUAL_PAYMENT_WEBHOOK_SECRET: ci-manual-payment-secret
        run: php artisan test

  docs-contract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify contract files exist
        run: |
          test -f docs/openapi.yaml
          test -f docs/deployment.md

      - name: Upload API contract artifact
        uses: actions/upload-artifact@v4
        with:
          name: fishbooker-contracts
          path: |
            docs/openapi.yaml
            docs/deployment.md
