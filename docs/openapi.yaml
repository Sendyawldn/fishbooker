openapi: 3.1.0
info:
  title: FishBooker API
  version: 0.1.0
  description: >
    OpenAPI contract for the API routes that are implemented in this repository
    as of 2026-04-22.
servers:
  - url: http://localhost:8000
    description: Local backend root
tags:
  - name: Auth
  - name: Slots
  - name: Bookings
  - name: Payments
  - name: Webhooks
  - name: Admin Slots
  - name: Admin Reporting
paths:
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Log in and create a Sanctum token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              default:
                value:
                  email: test@example.com
                  password: password
      responses:
        '200':
          description: Login succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Email or password is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              examples:
                invalid_credentials:
                  value:
                    message: Email atau password tidak valid.
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Compatibility alias for versioned login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Email or password is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Return the currently authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated user returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMeResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the current Sanctum token
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/v1/slots:
    get:
      tags: [Slots]
      summary: List all slots
      responses:
        '200':
          description: Slot list returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlotListResponse'
  /api/slots:
    get:
      tags: [Slots]
      summary: Compatibility alias for versioned slot list
      responses:
        '200':
          description: Slot list returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlotListResponse'
  /api/v1/bookings:
    post:
      tags: [Bookings]
      summary: Create a booking hold for a slot
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookingRequest'
            examples:
              default:
                value:
                  slot_id: 1
      responses:
        '200':
          description: Active hold already belongs to the same user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponse'
        '201':
          description: Booking hold created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '422':
          description: Validation failed or slot cannot be booked
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationErrorResponse'
                  - $ref: '#/components/schemas/SlotLockedResponse'
                  - $ref: '#/components/schemas/SlotUnavailableResponse'
  /api/v1/bookings/me:
    get:
      tags: [Bookings]
      summary: List bookings for the authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Booking history returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingHistoryResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/bookings:
    post:
      tags: [Bookings]
      summary: Compatibility alias for versioned booking creation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookingRequest'
      responses:
        '200':
          description: Active hold already belongs to the same user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponse'
        '201':
          description: Booking hold created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '422':
          description: Validation failed or slot cannot be booked
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationErrorResponse'
                  - $ref: '#/components/schemas/SlotLockedResponse'
                  - $ref: '#/components/schemas/SlotUnavailableResponse'
  /api/bookings/me:
    get:
      tags: [Bookings]
      summary: Compatibility alias for versioned booking history
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Booking history returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingHistoryResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/v1/bookings/{booking}/payments:
    post:
      tags: [Payments]
      summary: Create or reuse a payment for a pending booking
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentRequest'
      responses:
        '200':
          description: Payment returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '403':
          description: Booking does not belong to the authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '422':
          description: Booking is expired or cannot be paid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
  /api/v1/payments/{reference}:
    get:
      tags: [Payments]
      summary: Return payment detail by payment reference
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PaymentReference'
      responses:
        '200':
          description: Payment detail returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '403':
          description: Payment does not belong to the authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/v1/payments/webhooks/manual:
    post:
      tags: [Webhooks]
      summary: Process a signed manual payment webhook
      parameters:
        - name: X-Fishbooker-Event-Id
          in: header
          required: true
          schema:
            type: string
            example: evt-123
        - name: X-Fishbooker-Signature
          in: header
          required: true
          schema:
            type: string
            example: 87d4f4f6472d84af0f5014e2f48bbf8f1b4d9d170fb71b50c8f3c2507bb715aa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentWebhookRequest'
      responses:
        '200':
          description: Webhook processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentWebhookResponse'
        '401':
          description: Invalid webhook signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
  /api/v1/payments/webhooks/midtrans:
    post:
      tags: [Webhooks]
      summary: Process a Midtrans payment notification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MidtransWebhookRequest'
      responses:
        '200':
          description: Midtrans webhook processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentWebhookResponse'
        '401':
          description: Invalid Midtrans webhook signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
  /api/v1/admin/slots:
    post:
      tags: [Admin Slots]
      summary: Create a slot
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSlotRequest'
            examples:
              default:
                value:
                  slot_number: 11
                  price: 55000
                  status: TERSEDIA
      responses:
        '201':
          description: Slot created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlotMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '403':
          description: Authenticated user is not an admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
  /api/v1/admin/slots/{slot}:
    patch:
      tags: [Admin Slots]
      summary: Update a slot price or status
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SlotId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSlotRequest'
            examples:
              default:
                value:
                  price: 75000
                  status: PERBAIKAN
      responses:
        '200':
          description: Slot updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlotMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '403':
          description: Authenticated user is not an admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
    delete:
      tags: [Admin Slots]
      summary: Delete a slot
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SlotId'
      responses:
        '200':
          description: Slot deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '403':
          description: Authenticated user is not an admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/admin/slots:
    post:
      tags: [Admin Slots]
      summary: Compatibility alias for versioned slot creation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSlotRequest'
      responses:
        '201':
          description: Slot created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlotMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '403':
          description: Authenticated user is not an admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
  /api/admin/slots/{slot}:
    patch:
      tags: [Admin Slots]
      summary: Compatibility alias for versioned slot update
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SlotId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSlotRequest'
      responses:
        '200':
          description: Slot updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlotMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '403':
          description: Authenticated user is not an admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
    delete:
      tags: [Admin Slots]
      summary: Compatibility alias for versioned slot delete
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SlotId'
      responses:
        '200':
          description: Slot deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '403':
          description: Authenticated user is not an admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/v1/admin/dashboard:
    get:
      tags: [Admin Reporting]
      summary: Return admin analytics dashboard data
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dashboard data returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDashboardResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '403':
          description: Authenticated user is not an admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/v1/admin/reports/finance/export:
    get:
      tags: [Admin Reporting]
      summary: Export paid transactions as CSV
      security:
        - bearerAuth: []
      responses:
        '200':
          description: CSV file returned
          content:
            text/csv:
              schema:
                type: string
                example: '"reference","method","amount"'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '403':
          description: Authenticated user is not an admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/v1/admin/payments/{payment}/confirm-cash:
    post:
      tags: [Admin Reporting]
      summary: Confirm a pending cash payment
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PaymentId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCashConfirmRequest'
      responses:
        '200':
          description: Cash payment confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCashConfirmResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '403':
          description: Authenticated user is not an admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '422':
          description: Payment is not a confirmable cash payment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
  /api/v1/admin/bookings:
    get:
      tags: [Admin Bookings]
      summary: Return paginated admin booking operations data
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [ALL, PENDING, SUCCESS, CANCELLED]
        - name: payment_status
          in: query
          required: false
          schema:
            type: string
            enum: [ALL, NONE, PENDING, PAID, FAILED, EXPIRED, CANCELLED]
        - name: customer_access
          in: query
          required: false
          schema:
            type: string
            enum: [ALL, ACTIVE, BLOCKED]
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: Booking list returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminBookingListResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '403':
          description: Authenticated user is not an admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/v1/admin/bookings/{booking}/cancel:
    post:
      tags: [Admin Bookings]
      summary: Cancel a pending booking as admin
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminBookingCancelRequest'
      responses:
        '200':
          description: Booking cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminBookingMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '403':
          description: Authenticated user is not an admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '422':
          description: Validation failed or booking cannot be cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
  /api/v1/admin/operations/booking-controls:
    get:
      tags: [Admin Bookings]
      summary: Return booking kill switch and hold limit controls
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Booking controls returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminBookingControlsResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '403':
          description: Authenticated user is not an admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
    patch:
      tags: [Admin Bookings]
      summary: Update booking kill switch and hold limit controls
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminBookingControlsRequest'
      responses:
        '200':
          description: Booking controls updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminBookingControlsResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '403':
          description: Authenticated user is not an admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
  /api/v1/admin/customers:
    get:
      tags: [Admin Bookings]
      summary: Return customer booking access data
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: Customer booking access list returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCustomerListResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '403':
          description: Authenticated user is not an admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/v1/admin/customers/{user}/booking-access:
    patch:
      tags: [Admin Bookings]
      summary: Block or restore customer booking access
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCustomerBookingAccessRequest'
      responses:
        '200':
          description: Customer booking access updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCustomerMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '403':
          description: Authenticated user is not an admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '422':
          description: Validation failed or user is not a customer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token
  parameters:
    SlotId:
      name: slot
      in: path
      required: true
      description: Slot primary key
      schema:
        type: integer
        example: 1
    BookingId:
      name: booking
      in: path
      required: true
      description: Booking primary key
      schema:
        type: integer
        example: 10
    PaymentId:
      name: payment
      in: path
      required: true
      description: Payment primary key
      schema:
        type: integer
        example: 20
    UserId:
      name: user
      in: path
      required: true
      description: User primary key
      schema:
        type: integer
        example: 3
    PaymentReference:
      name: reference
      in: path
      required: true
      description: Public payment reference UUID
      schema:
        type: string
        format: uuid
        example: 2db6d5f0-c508-4ff7-8f55-90b0f2719dd0
  schemas:
    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          description: User email address
          example: test@example.com
        password:
          type: string
          description: User password
          example: password
    UserSummary:
      type: object
      additionalProperties: false
      required: [id, name, email, role]
      properties:
